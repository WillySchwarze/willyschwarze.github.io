{{ define "main" }}
<div class="single-page">
  <div class="section-header section-header-base">
    <div class="container">
      <h1 class="Contentpage">{{ .Title }}</h1>
    </div>
  </div>
  {{ if not .IsHome }} 
  <div class="container">
    <a href="/" onclick="history.back(); return false;" class="back-btn">
      ← Zurück
    </a>
  </div>
  {{ end }}
  <div class="container">
    <div class="wrapper">
      <div class="row main-body">
        <div class="section-wrapper">
          <div class="section">
            <div class="section-content">{{ .Content }}</div>
            {{ partial "section-cards.html" . }}
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
{{ end }}
