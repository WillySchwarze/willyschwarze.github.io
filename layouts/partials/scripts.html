<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
    
function toggleKontoinhaber() {
   console.log("SCRIPTS.HTML GELADEN");
  const checkbox = document.getElementById("abweichend");
  const felder = document.getElementById("kontoInhaberFelder");

  if (checkbox.checked) {
    felder.style.display = "block";
  } else {
    felder.style.display = "none";
  }

}

document.addEventListener("DOMContentLoaded", function () {
  console.log("DOM geladen");

  const btn = document.getElementById("pdfBtn");

  if (!btn) {
    console.log("Button nicht gefunden");
    return;
  }

  btn.addEventListener("click", function () {
    console.log("PDF FUNKTION LÄUFT");

    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();

    // =====================
    // Werte holen
    // =====================
    const vorname = document.getElementById("vorname")?.value || "";
    const nachname = document.getElementById("nachname")?.value || "";
    const adresse = document.getElementById("adresse")?.value || "";
    const ort = document.getElementById("ort")?.value || "";
    const email = document.getElementById("email")?.value || "";
    const phone = document.getElementById("phone")?.value || "";

    const iban = document.getElementById("iban")?.value || "";
    const bic = document.getElementById("bic")?.value || "";
    const kreditinstitut = document.getElementById("Kreditinstitut")?.value || "";

    const abweichend = document.getElementById("abweichend")?.checked;

    // Kontoinhaber Logik
    let kontoName = vorname + " " + nachname;
    let kontoAdresse = adresse + ", " + ort;

    if (abweichend) {
      const kVor = document.getElementById("kontoInhVor")?.value || "";
      const kNach = document.getElementById("kontoInhNach")?.value || "";
      const kStr = document.getElementById("kontoInhStr")?.value || "";
      const kOrt = document.getElementById("kontoInhPLZ")?.value || "";

      kontoName = kVor + " " + kNach;
      kontoAdresse = kStr + ", " + kOrt;
    }

    // =====================
    // PDF Layout
    // =====================

    // Titel
    doc.setFontSize(18);
    doc.text("Mitgliedsantrag", 20, 20);

    doc.setFontSize(12);

    // Persönliche Daten
    doc.text("Persönliche Daten", 20, 40);
    doc.text(`Name: ${vorname} ${nachname}`, 20, 50);
    doc.text(`Adresse: ${adresse}`, 20, 60);
    doc.text(`PLZ/Ort: ${ort}`, 20, 70);
    doc.text(`Telefon: ${phone}`, 20, 80);
    doc.text(`Email: ${email}`, 20, 90);

    // SEPA
    doc.text("Bankverbindung (SEPA)", 20, 110);
    doc.text(`Kontoinhaber: ${kontoName}`, 20, 120);
    doc.text(`Adresse: ${kontoAdresse}`, 20, 130);
    doc.text(`IBAN: ${iban}`, 20, 140);
    doc.text(`BIC: ${bic}`, 20, 150);
    doc.text(`Kreditinstitut: ${kreditinstitut}`, 20, 160);

    // Erklärung
    doc.text("Hiermit beantrage ich die Mitgliedschaft.", 20, 180);

    // Unterschrift
    doc.text("Ort, Datum:", 20, 210);
    doc.line(20, 215, 100, 215);

    doc.text("Unterschrift:", 20, 230);
    doc.line(20, 235, 100, 235);

    // Download
    doc.save("mitgliedsantrag.pdf");
  });
});
</script>
