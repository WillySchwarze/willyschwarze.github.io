            <div class="section-content"><script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
    
function toggleKontoinhaber() {
   console.log("SCRIPTS.HTML GELADEN");
  const checkbox = document.getElementById("abweichend");
  const felder = document.getElementById("kontoInhaberFelder");

  if (checkbox.checked) {
    felder.style.display = "block";
  } else {
    felder.style.display = "none";
  }

}

document.addEventListener("DOMContentLoaded", function () {

  document.getElementById("anmeldung-form")
  .addEventListener("submit", function (e) {

    e.preventDefault();

    const form = document.getElementById("anmeldung-form");

    console.log(form.reportValidity());

    if(!form.reportValidity()) {
      return;
    }

    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();

    
    
    
    const vorname = document.getElementById("vorname")?.value || "";
    const nachname = document.getElementById("nachname")?.value || "";
    const adresse = document.getElementById("adresse")?.value || "";
    const ort = document.getElementById("ort")?.value || "";
    const email = document.getElementById("email")?.value || "";
    const phone = document.getElementById("phone")?.value || "";

    const iban = document.getElementById("iban")?.value || "";
    const bic = document.getElementById("bic")?.value || "";
    const kreditinstitut = document.getElementById("Kreditinstitut")?.value || "";
    const pay = document.getElementById("pay")?.value || "";

    const abweichend = document.getElementById("abweichend")?.checked;

    
    let kontoName = vorname + " " + nachname;
    let kontoOrt = ort;
    let kontoAdresse = adresse;

    if (abweichend) {
      const kVor = document.getElementById("kontoInhVor")?.value || "";
      const kNach = document.getElementById("kontoInhNach")?.value || "";
      const kStr = document.getElementById("kontoInhStr")?.value || "";
      const kOrt = document.getElementById("kontoInhPLZ")?.value || "";

      kontoName = kVor + " " + kNach;
      kontoAdresse = kStr;
      kontoOrt = kOrt;
    }

    
    
    

    
    doc.setFontSize(25);
    doc.setFont("helvetica", "bold");
    doc.text("Antrag auf Mitgliedschaft", 20, 20);
    doc.setFontSize(8);
    doc.setFont("helvetica", "normal");
    doc.text("Bitte beachten Sie: Gemäß der maßgeblichen Satzung können alle juristischen und volljährigen natürlichen Personen Mitglied",20 ,30);
    doc.text("werden, die die Ziele des Vereins unterstützen und fördern wollen. Aus der Mitgliedschaft ergibt sich kein Anspruch auf Aufnahme",20 ,34);
    doc.text("eines Kindes an dieser Schule.",20 ,38);

    doc.setFontSize(12);
    doc.setFont("helvetica", "bold");
    
    doc.text("Vorliegend beantrage ich die Aufnahme in den „Förderverein Perspektiven e.V.“:", 20, 50);
    
    
    
    
    doc.text(`${vorname} ${nachname}`, 20, 60);
    doc.line(20, 62, 185, 62);
    doc.setFont("helvetica", "normal");
    doc.setFontSize(11);
    doc.text(`Vorname und Name`, 20, 67);

    
    doc.setFont("helvetica", "bold");
    doc.setFontSize(12);
    doc.text(`${adresse}`, 20, 77);
    doc.line(20, 79, 100, 79);
    doc.text(`${ort}`, 105, 77);
    doc.line(105, 79, 185, 79);

    doc.setFont("helvetica", "normal");
    doc.setFontSize(11);
    doc.text(`Straße und Hausnummer`, 20, 84);
    doc.text(`Postleitzahl und Ort`, 105, 84);

    
    doc.setFont("helvetica", "bold");
    doc.setFontSize(12);
    doc.text(`${phone}`, 20, 94);
    doc.line(20, 96, 100, 96);
    doc.text(`${email}`, 105, 94);
    doc.line(105, 96, 185, 96);
    
    doc.setFont("helvetica", "normal");
    doc.setFontSize(11);
    doc.text(`Telefonnummer`, 20, 101);
    doc.text(`Emailadresse`, 105, 101);

    
    doc.setFontSize(8)
    doc.setFont("helvetica", "normal");
    doc.text("Es wird zugesichert, dass Ihre Daten entsprechend DSGVO sowie BDSG verarbeitet und nur zu vereinsinternen Zwecken",20 ,111);
    doc.text("verwendet werden. Nach erfolgter Aufnahme wird erklärt, dass entsprechend der jeweils gültigen Satzung und Beitragsordnung",20 ,115);
    doc.text("der Verein in seiner ideellen Zielsetzung unterstützt wird.",20 ,119);

    doc.setFontSize(11)
    doc.text(`Das aufgenommene Mitglied erklärt sich des Weiteren bereit ${pay}€ jährlich als Mitglieds-`,20 ,130);
    doc.text("beitrag zu zahlen.",20, 135);

    
    doc.setFontSize(20);
    doc.setFont("helvetica", "bold");
    doc.text("SEPA-Lastschriftmandat", 20, 150);
    doc.setFontSize(8);
    doc.setFont("helvetica", "normal");
    doc.text("für wiederkehrende Zahlungen", 105, 150);

    doc.setFontSize(11)
    doc.text("Ich ermächtige hiermit den Förderverein Zahlungen von meinem Konto mittels Lastschrift",20 ,160);
    doc.text("einzuziehen. Zugleich weise ich mein Kreditinstitut an, die vom Förderverein auf mein Konto",20 ,164);
    doc.text("gezogenen Lastschriften einzulösen.",20 ,168);

    doc.setFontSize(8)
    doc.text("Hinweis: Sie können innerhalb von acht Wochen, beginnend mit dem Belastungsdatum, die Erstattung des belasteten Betrages",20 ,175);
    doc.text("verlangen. Es gelten die mit meinem Kreditinstitut vereinbarten Bedingungen.",20 ,179);

    
    
    doc.setFont("helvetica", "bold");
    doc.setFontSize(12);
    doc.text(`${kontoName} `, 20, 187);
    doc.line(20, 189, 185, 189);
    doc.setFont("helvetica", "normal");
    doc.setFontSize(11);
    doc.text(`Kontoinhaber - Vorname, Name`, 20, 194);

    
    doc.setFont("helvetica", "bold");
    doc.setFontSize(12);
    doc.text(`${kontoAdresse}`, 20, 204);
    doc.line(20, 206, 100, 206);
    doc.text(`${kontoOrt}`, 105, 204);
    doc.line(105, 206, 185, 206);

    doc.setFont("helvetica", "normal");
    doc.setFontSize(11);
    doc.text(`Straße und Hausnummer`, 20, 211);
    doc.text(`Postleitzahl und Ort`, 105, 211);

    
    doc.setFont("helvetica", "bold");
    doc.setFontSize(12);
    doc.text(`${bic}`, 20, 221);
    doc.line(20, 223, 100, 223);
    doc.text(`${kreditinstitut}`, 105, 221);
    doc.line(105, 223, 185, 223);

    doc.setFont("helvetica", "normal");
    doc.setFontSize(11);
    doc.text(`BIC`, 20, 228);
    doc.text(`Kreditinstitut`, 105, 228);
    
    
    doc.setFont("helvetica", "bold");
    doc.setFontSize(12);
    doc.text(`${iban} `, 20, 238);
    doc.line(20, 240, 185, 240);
    doc.setFont("helvetica", "normal");
    doc.setFontSize(11);
    doc.text(`IBAN`, 20, 245);

    doc.setFontSize(11);
    doc.setFont("helvetica", "bold");
    doc.text("Dieses SEPA-Lastschriftmandat gilt für die Mitgliedschaft des oben genannten Antragstellers.",20 ,253);
    doc.text("Die Mandatsreferenz wird separat mitgeteilt.",20 ,257);

    doc.setFont("helvetica", "normal");
    doc.text("Ort, Datum", 20, 265);
    doc.line(40, 265, 70, 265);
    doc.text("Unterschrift", 105, 265);
    doc.line(110, 265, 70, 265);

    

    
    doc.save("mitgliedsantrag.pdf");
  });

});
</script>

<form id="anmeldung-form">

  <h3>Persönliche Daten</h3>

  <div class="form-row">
    <div class="form-group">
        
        <input type="text" id="vorname" placeholder="Vorname" required><br><br>
    </div>  
    <div class="form-group">
        
        <input type="text" id="nachname" placeholder="Nachname" required><br><br>
    </div>    
  </div>

  <div class="form-row">
    <div class="form-group">
        
        <input type="text" id="adresse" placeholder="Straße und Hausnummer" required><br><br>
    </div>  
    <div class="form-group">
        
        <input type="text" id="ort" placeholder="PLZ und Ort" required><br><br>
    </div>    
  </div>
  
  <div class="form-row">
    <div class="form-group">
        
        <input type="tel" id="phone" placeholder="Telefonnummer" pattern="[0-9+\s\/()-]{6,}" required><br><br>
    </div>  
    <div class="form-group">
        
        <input type="email" id="email" placeholder="Emailadresse" required><br><br>
    </div>    
  </div>

  <h3>Bankverbindung (SEPA)</h3>

  <label>
  <input type="checkbox" id="abweichend" onchange="toggleKontoinhaber()">
    Kontoinhaber weicht von oben ab
  </label><br><br>
  
  <div id="kontoInhaberFelder" style="display: none;">
    <div class="form-row">
      <div class="form-group">
        
        <input type="text" id="kontoInhVor" placeholder="Kontoinhaber Vorname"><br><br>
      </div>  
      <div class="form-group">
        
        <input type="text" id="kontoInhNach" placeholder="Kontoinhaber Nachname"><br><br>
      </div>    
    </div>
    <div class="form-row">
      <div class="form-group">
        
        <input type="text" id="kontoInhStr" placeholder="Straße und Hausnummer"><br><br>
      </div>  
      <div class="form-group">
        
        <input type="text" id="kontoInhPLZ" placeholder="Kontoinhaber PLZ und Ort"><br><br>
      </div>    
    </div> 
  </div>

  <div class="form-row">
    <div class="form-group">
      
      <input type="text" id="bic" placeholder="BIC" required><br><br>
    </div>
    <div class="form-group">
      
      <input type="text" id="Kreditinstitut" placeholder="Kreditinstitut" required><br><br>
    </div>    
  </div>  
  <div class="form-row">
    <div class="form-group">
      
      <input type="text" id="iban" placeholder="IBAN: DE00 0000 0000 0000 0000 00" pattern="DE[0-9]{20}" title="Bitte gültige deutsche IBAN eingeben" required><br><br>
    </div>
    <div class="form-group">
      
      <input type="number" id="pay" placeholder="Gewünschter Jährlicher Zahlbetrag (min 20,00€)" min="20" step="0.01" title="Bitte gültigen Betrag eingeben" required>
      <br><br>
    </div>
  </div>   

  <label>
    <input type="checkbox" id="sepa" required>
        Ich ermächtige den Verein, Zahlungen mittels SEPA-Lastschrift einzuziehen.
  </label><br><br>

  <button type="submit" id="pdfBtn" class="pdf-btn">PDF erstellen</button>

</form></div>
            
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
