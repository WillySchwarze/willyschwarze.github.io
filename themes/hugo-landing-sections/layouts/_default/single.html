{{ define "main" }}

    <h1>{{ .Title }}</h1>
  </div>
</div>
<div class="container my-4">
  <div class="wrapper">
    <div class="row main-body">
      <div class="section-wrapper">
        <div class="section">
          <div class="section-content">{{ .Content }}</div>
          {{ partial "section-cards.html" . }}
        </div>
      </div>
    </div>
  </div>
</div>
{{ end }}
