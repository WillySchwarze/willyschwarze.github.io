<!DOCTYPE html>
<html lang="{{ .Site.Language.Lang }}">
  {{ partial "head.html" .}}
  {{ if .Site.Params.maintenance }}
  {{ partial "maintenance.html" . }}
{{ else }}
  <body class="d-flex flex-column min-vh-100">
    {{ partial "header.html" . }}
    {{ block "main" . }} {{ end }}
    {{ partial "footer.html" . }}
    {{ partial "scripts.html" . }}
    {{ block "htmlAfterFooter" . }} {{ end }}
  </body>
  {{ end }}
</html>
